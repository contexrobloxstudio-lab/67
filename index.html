<!DOCTYPE html>
<html>
<head>
<title>Brainrot Store</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
background:linear-gradient(270deg,#0f2027,#203a43,#2c5364);
background-size:600% 600%;
animation:bg 15s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

header{
text-align:center;
padding:40px;
font-size:40px;
font-weight:bold;
}

.games{
display:grid;
grid-template-columns:repeat(auto-fit,300px);
gap:40px;
justify-content:center;
padding:40px;
}

.card{
background:#1e293b;
border-radius:15px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
transition:0.3s;
text-align:center;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:10px;
}

.play{
display:inline-block;
margin-top:10px;
padding:10px 20px;
background:#3b82f6;
border-radius:8px;
text-decoration:none;
color:white;
font-weight:bold;
}

.rating{
color:gold;
font-size:20px;
margin-top:5px;
}

</style>
</head>

<body>

<header>Brainrot Game Store</header>

<div class="games">

<div class="card">
<img src="https://tr.rbxcdn.com/180DAY-4c7b6c02cbbd4e1d79d6f89a1d9f9f3c/768/432/Image/Webp/noFilter">
<h2>Escape Tsunami</h2>

<div class="rating">⭐⭐⭐⭐☆</div>

<a class="play" href="game1.html">
Open Page
</a>

</div>


<div class="card">
<img src="https://tr.rbxcdn.com/180DAY-dfa64c1e0d0c8e75401228be7baac704/768/432/Image/Webp/noFilter">
<h2>Steal a Brainrot</h2>

<div class="rating">⭐⭐⭐⭐⭐</div>

<a class="play" href="game2.html">
Open Page
</a>

</div>

</div>

</body>
</html>
