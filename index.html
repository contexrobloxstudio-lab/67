<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Brainrot Games</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
margin:0;
color:white;
text-align:center;
}

header{
padding:30px;
font-size:35px;
font-weight:bold;
}

.games{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
padding:40px;
}

.game-card{
background:#1e293b;
border-radius:15px;
width:260px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
transition:0.3s;
}

.game-card:hover{
transform:translateY(-10px);
box-shadow:0 15px 35px rgba(0,0,0,0.6);
}

.game-card img{
width:100%;
border-radius:10px;
}

.game-card h3{
margin:15px 0 10px 0;
}

.game-card p{
color:#cbd5e1;
}

.download-btn{
display:inline-block;
margin-top:15px;
padding:12px 20px;
background:#3b82f6;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
transition:0.2s;
}

.download-btn:hover{
background:#2563eb;
transform:scale(1.05);
}

</style>
</head>

<body>

<header>
Brainrot Roblox Games
</header>

<div class="games">

<div class="game-card">
<img src="tsunami.png">
<h3>Escape Tsunami</h3>
<p>Uncopylocked Roblox game</p>

<a class="download-btn" href="escape-tsunami.rbxl" download>
Download
</a>

</div>

</div>

</body>
</html>
